{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Update report status</h1>
    <p>Report: <strong>{{ report.title }}</strong> for {{ report.patient.username }}</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="status">Status</label>
            <select name="status" id="status">
                {% for value, label in report.STATUS_CHOICES %}
                    <option value="{{ value }}" {% if report.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Update Status</button>
    </form>
</div>
{% endblock %}
